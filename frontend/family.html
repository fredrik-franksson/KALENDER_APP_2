<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">BrainDump — Group Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:   #F3F1EC;
      --ink:     #0F0F0E;
      --ink-2:   #6E6B66;
      --rule:    #CBC8C2;
      --surface: #E7E5E0;
      --green:   #1B3D2C;
      --red:     #B91C1C;
    }

    html { font-size: 16px; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 48px;
    }
    @media (max-width: 600px) { .wrap { padding: 0 20px; } }

    /* ── Masthead ── */
    .masthead {
      padding: 32px 0 24px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid var(--ink);
    }
    .masthead-left {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .masthead-wordmark {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
    }
    .masthead-sep {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--rule);
    }
    .masthead-section {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
    }
    .masthead-right {
      display: flex;
      align-items: baseline;
      gap: 20px;
    }
    .masthead-user {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--ink-2);
    }
    .masthead-user button {
      background: none;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--ink-2);
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
      margin-left: 8px;
      transition: color 0.15s;
    }
    .masthead-user button:hover { color: var(--ink); }

    /* ── Language toggle ── */
    .lang-toggle { display: flex; align-items: center; gap: 7px; }
    .lang-btn {
      background: none;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      color: var(--ink-2);
      padding: 0;
      transition: color 0.15s;
    }
    .lang-btn.active { color: var(--ink); }
    .lang-btn:hover  { color: var(--ink); }
    .lang-sep {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--rule);
      user-select: none;
    }
    .masthead-date {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--ink-2);
    }

    /* ── Calendar section header ── */
    .calendar-header {
      padding: 44px 0 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--rule);
    }
    .header-controls { display: flex; align-items: center; gap: 10px; }

    .btn-add {
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      padding: 10px 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: border-color 0.15s;
    }
    .btn-add:hover { border-color: var(--ink); }

    .btn-mic {
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      padding: 10px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: border-color 0.15s;
    }
    .btn-mic:hover:not(:disabled) { border-color: var(--ink); }
    .btn-mic:disabled              { opacity: 0.35; cursor: not-allowed; }
    .btn-mic.recording             { border-color: var(--red); color: var(--red); }

    .mic-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      border: 1px solid currentColor;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-mic.recording .mic-dot {
      background: var(--red);
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .voice-status {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--ink-2);
      font-style: italic;
      min-height: 18px;
      margin-top: 12px;
    }
    .voice-status.error { color: var(--red); font-style: normal; }

    /* ── Add form ── */
    .add-form {
      border-bottom: 1px solid var(--rule);
      padding: 36px 0;
      display: none;
    }
    .add-form.open { display: block; }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 0 48px;
    }
    @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 24px;
    }
    .form-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-2);
    }
    .form-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--rule);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: var(--ink);
      padding: 8px 0;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-bottom-color: var(--ink); }
    input[type="date"].form-input {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--ink-2);
    }
    .form-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      padding-top: 8px;
    }
    .btn-save {
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 11px 28px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save:hover:not(:disabled) { background: var(--green); }
    .btn-save:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-cancel {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      color: var(--ink-2);
      cursor: pointer;
      padding: 11px 0;
      transition: color 0.15s;
    }
    .btn-cancel:hover { color: var(--ink); }

    /* ── Day panels (Today / Tomorrow) ── */
    .day-panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 56px;
      padding: 40px 0;
      border-bottom: 1px solid var(--rule);
    }
    @media (max-width: 620px) {
      .day-panels { grid-template-columns: 1fr; gap: 32px; }
    }

    .day-panel-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-2);
      margin-bottom: 6px;
    }
    .day-panel-date {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.3rem, 2vw, 1.7rem);
      color: var(--ink);
      line-height: 1.1;
      margin-bottom: 14px;
    }

    .empty-state {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      color: var(--rule);
      padding-top: 4px;
    }

    /* ── Month navigation ── */
    .month-nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 36px 0 28px;
    }
    .month-nav-heading {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(2rem, 3.5vw, 3rem);
      color: var(--ink);
      line-height: 1;
    }
    .month-arrow {
      background: none;
      border: 1px solid var(--rule);
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      color: var(--ink-2);
      padding: 8px 18px;
      cursor: pointer;
      line-height: 1;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .month-arrow:hover { border-color: var(--ink); color: var(--ink); }

    /* ── Calendar grid ── */
    .cal-section { padding-bottom: 80px; }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px;
    }
    .cal-weekday {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-2);
      text-align: center;
      padding-bottom: 8px;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: var(--rule);
      border: 1px solid var(--rule);
    }
    .cal-day {
      background: var(--paper);
      aspect-ratio: 1;
      min-height: 68px;
      padding: 7px 6px;
      overflow: hidden;
      position: relative;
    }
    .cal-day.other-month { background: var(--surface); }
    .cal-day.today       { background: var(--ink); }

    .cal-day-num {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      line-height: 1;
      color: var(--ink-2);
      margin-bottom: 5px;
    }
    .cal-day.today .cal-day-num       { color: var(--paper); opacity: 0.7; }
    .cal-day.other-month .cal-day-num { color: var(--rule); }

    .cal-item {
      display: block;
      font-size: 0.64rem;
      font-weight: 400;
      line-height: 1.25;
      color: var(--ink);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cal-day.today .cal-item       { color: var(--paper); }
    .cal-day.other-month .cal-item { color: var(--ink-2); }

    .cal-item-more {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      color: var(--ink-2);
      margin-top: 2px;
    }
    .cal-day.today .cal-item-more { color: var(--paper); opacity: 0.5; }

    /* ── Event cards (day panels) ── */
    .event-list { list-style: none; }
    .event-item {
      padding: 14px 0;
      border-bottom: 1px solid var(--surface);
      animation: fadeUp 0.25s ease both;
    }
    .event-item:last-child { border-bottom: none; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .event-top {
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }
    .event-title {
      font-size: 0.9rem;
      font-weight: 400;
      flex: 1;
    }
    .event-meta {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      color: var(--rule);
      letter-spacing: 0.04em;
      margin-top: 4px;
    }
    .event-notes {
      font-size: 0.76rem;
      color: var(--ink-2);
      font-style: italic;
      margin-top: 5px;
    }

    /* ── Reactions ── */
    .reaction-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .reaction-names {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--ink-2);
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .reaction-names span { display: flex; gap: 5px; align-items: center; }
    .react-btns { display: flex; gap: 8px; margin-left: auto; align-items: center; }
    .react-btn {
      background: transparent;
      border: 1px solid var(--rule);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      color: var(--ink-2);
      padding: 5px 14px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .react-btn:hover        { border-color: var(--ink); color: var(--ink); }
    .react-btn.active-up    { border-color: var(--green); color: var(--green); background: rgba(27,61,44,0.06); }
    .react-btn.active-down  { border-color: var(--red);   color: var(--red);   background: rgba(185,28,28,0.06); }

    .btn-delete-event {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--rule);
      padding: 0;
      margin-left: 6px;
      line-height: 0;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .btn-delete-event:hover { color: var(--red); }

    @media (prefers-reduced-motion: reduce) {
      .event-item { animation: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="masthead">
      <div class="masthead-left">
        <a href="/braindump.html" class="masthead-wordmark">BrainDump</a>
        <span class="masthead-sep">/</span>
        <span class="masthead-section" id="mastheadSection">Group Schedule</span>
      </div>
      <div class="masthead-right">
        <span class="masthead-user" id="mastheadUser" style="display:none"></span>
        <div class="lang-toggle">
          <button class="lang-btn active" id="langEn">EN</button>
          <span class="lang-sep">·</span>
          <button class="lang-btn" id="langSv">SV</button>
        </div>
        <span class="masthead-date" id="mastheadDate"></span>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="wrap">

    <!-- ── Calendar ── -->
    <section id="calendarSection">

      <div class="calendar-header">
        <div class="header-controls">
          <button class="btn-add" id="addBtn">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M6.5 1v11M1 6.5h11"/>
            </svg>
            <span id="addBtnLabel">New event</span>
          </button>
          <button class="btn-mic" id="micBtn">
            <span class="mic-dot"></span>
            <span id="micLabel">Record</span>
          </button>
        </div>
        <p class="voice-status" id="voiceStatus"></p>
      </div>

      <!-- Add form -->
      <div class="add-form" id="addForm">
        <div class="form-grid">
          <div>
            <div class="form-field">
              <label class="form-label" id="whatLabel" for="eventTitle">What's happening?</label>
              <input class="form-input" type="text" id="eventTitle" />
            </div>
            <div class="form-field">
              <label class="form-label" id="detailsLabel" for="eventNotes">Details (optional)</label>
              <input class="form-input" type="text" id="eventNotes" />
            </div>
          </div>
          <div>
            <div class="form-field">
              <label class="form-label" id="whenLabel" for="eventDate">When?</label>
              <input class="form-input" type="date" id="eventDate" />
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-save" id="saveBtn">Add event</button>
          <button class="btn-cancel" id="cancelBtn">Cancel</button>
        </div>
      </div>

      <!-- Today & Tomorrow -->
      <div class="day-panels">
        <div class="day-panel">
          <p class="day-panel-eyebrow" id="todayLabel">Today</p>
          <p class="day-panel-date"    id="todayDate"></p>
          <p class="empty-state"       id="todayEmpty">—</p>
          <div                         id="todayList"></div>
        </div>
        <div class="day-panel">
          <p class="day-panel-eyebrow" id="tomorrowLabel">Tomorrow</p>
          <p class="day-panel-date"    id="tomorrowDate"></p>
          <p class="empty-state"       id="tomorrowEmpty">—</p>
          <div                         id="tomorrowList"></div>
        </div>
      </div>

      <!-- Month navigation -->
      <div class="month-nav-bar">
        <button class="month-arrow" id="prevMonth" aria-label="Previous month">←</button>
        <span class="month-nav-heading" id="monthNavHeading"></span>
        <button class="month-arrow" id="nextMonth" aria-label="Next month">→</button>
      </div>

      <!-- Calendar grid -->
      <div class="cal-section">
        <div class="cal-weekdays" id="calWeekdays"></div>
        <div class="cal-grid"     id="calGrid"></div>
      </div>

    </section>

  </div>
</main>

<script>
  // ── Translations ───────────────────────────────────────────────────────
  const T = {
    en: {
      pageTitle:          'BrainDump — Group Schedule',
      sectionName:        'Group Schedule',
      notYou:             'not you?',
      newEvent:           'New event',
      whatLabel:          "What's happening?",
      whatPlaceholder:    'Family dinner, movie night…',
      detailsLabel:       'Details (optional)',
      detailsPlaceholder: 'Bring something, meet at…',
      whenLabel:          'When?',
      addEvent:           'Add event',
      adding:             'Adding…',
      cancel:             'Cancel',
      addedBy:            (n) => `added by ${n}`,
      noResponses:        'No responses yet',
      going:              '👍 Going',
      cantMake:           "👎 Can't make it",
      deleteConfirm:      'Delete this event?',
      loadErr:            'Could not load events.',
      saveErr:            'Could not save event.',
      voiceLang:          'en-US',
      record:             'Record',
      stop:               'Stop',
      listening:          'Listening…',
      notHeard:           'Nothing was heard — try again.',
      micDenied:          'Microphone access denied.',
      voiceErr:           'Voice error: ',
      today:              'Today',
      tomorrow:           'Tomorrow',
      weekdays:           ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
    },
    sv: {
      pageTitle:          'BrainDump — Gruppschemat',
      sectionName:        'Gruppschemat',
      notYou:             'inte du?',
      newEvent:           'Nytt event',
      whatLabel:          'Vad händer?',
      whatPlaceholder:    'Familjemiddag, filmkväll…',
      detailsLabel:       'Detaljer (valfritt)',
      detailsPlaceholder: 'Ta med något, träffas vid…',
      whenLabel:          'När?',
      addEvent:           'Lägg till',
      adding:             'Lägger till…',
      cancel:             'Avbryt',
      addedBy:            (n) => `tillagd av ${n}`,
      noResponses:        'Inga svar ännu',
      going:              '👍 Jag kommer',
      cantMake:           '👎 Kan inte',
      deleteConfirm:      'Ta bort detta event?',
      loadErr:            'Kunde inte ladda events.',
      saveErr:            'Kunde inte spara.',
      voiceLang:          'sv-SE',
      record:             'Spela in',
      stop:               'Stopp',
      listening:          'Lyssnar…',
      notHeard:           'Inget hördes — försök igen.',
      micDenied:          'Mikrofonåtkomst nekad.',
      voiceErr:           'Röstfel: ',
      today:              'Idag',
      tomorrow:           'Imorgon',
      weekdays:           ['Mån', 'Tis', 'Ons', 'Tor', 'Fre', 'Lör', 'Sön'],
    },
  };

  // ── Date helpers ──────────────────────────────────────────────────────
  const DAYS = {
    en: ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],
    sv: ['söndag','måndag','tisdag','onsdag','torsdag','fredag','lördag'],
  };
  const MONTHS = {
    en: ['January','February','March','April','May','June','July','August','September','October','November','December'],
    sv: ['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'],
  };

  function toDateISO(d) {
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }

  function formatToday(lang) {
    const d = new Date();
    return `${DAYS[lang][d.getDay()]} ${d.getDate()} ${MONTHS[lang][d.getMonth()]} ${d.getFullYear()}`;
  }

  function formatDayDate(d, lang) {
    return `${DAYS[lang][d.getDay()]} ${d.getDate()} ${MONTHS[lang][d.getMonth()]} ${d.getFullYear()}`;
  }

  function displayDate(isoDate, lang) {
    if (!isoDate) return '';
    const [y, m, d] = isoDate.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    return `${DAYS[lang][date.getDay()]} ${d} ${MONTHS[lang][m - 1]}`;
  }

  function getCurrentMonth() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  }

  function stepMonth(key, delta) {
    const [y, m] = key.split('-').map(Number);
    const d = new Date(y, m - 1 + delta, 1);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  }

  function monthLabel(key, lang) {
    const [y, m] = key.split('-').map(Number);
    return `${MONTHS[lang][m - 1]} ${y}`;
  }

  // ── Language state ────────────────────────────────────────────────────
  const LANG_KEY  = 'braindump_lang';
  let currentLang = localStorage.getItem(LANG_KEY) || 'en';
  const t         = () => T[currentLang];
  let recording   = false;
  let cachedEvents = [];
  let activeMonth  = getCurrentMonth();

  function applyLang(lang) {
    currentLang = lang;
    localStorage.setItem(LANG_KEY, lang);

    document.getElementById('langEn').classList.toggle('active', lang === 'en');
    document.getElementById('langSv').classList.toggle('active', lang === 'sv');

    const tr = T[lang];
    document.title                                           = tr.pageTitle;
    document.getElementById('mastheadSection').textContent  = tr.sectionName;
    document.getElementById('mastheadDate').textContent     = formatToday(lang);
    document.getElementById('addBtnLabel').textContent      = tr.newEvent;
    document.getElementById('whatLabel').textContent        = tr.whatLabel;
    document.getElementById('eventTitle').placeholder       = tr.whatPlaceholder;
    document.getElementById('detailsLabel').textContent     = tr.detailsLabel;
    document.getElementById('eventNotes').placeholder       = tr.detailsPlaceholder;
    document.getElementById('whenLabel').textContent        = tr.whenLabel;
    document.getElementById('saveBtn').textContent          = tr.addEvent;
    document.getElementById('cancelBtn').textContent        = tr.cancel;
    if (!recording) document.getElementById('micLabel').textContent = tr.record;
    if (recognition) recognition.lang = tr.voiceLang;

    const userEl = document.getElementById('mastheadUser');
    if (familyName) {
      userEl.innerHTML = `${familyName} <button id="switchBtn">${tr.notYou}</button>`;
      document.getElementById('switchBtn').addEventListener('click', switchUser);
    }

    renderWeekdayHeaders(lang);
    renderAll();
  }

  // ── Auth state ────────────────────────────────────────────────────────
  const CODE_KEY = 'family_code';
  const NAME_KEY = 'family_name';

  let familyCode = localStorage.getItem(CODE_KEY) || '';
  let familyName = localStorage.getItem(NAME_KEY) || '';

  function apiHeaders() {
    return { 'Content-Type': 'application/json', 'x-family-code': familyCode };
  }

  // ── DOM refs ──────────────────────────────────────────────────────────
  const mastheadUser = document.getElementById('mastheadUser');
  const addBtn       = document.getElementById('addBtn');
  const addForm      = document.getElementById('addForm');
  const eventTitle   = document.getElementById('eventTitle');
  const eventDate    = document.getElementById('eventDate');
  const eventNotes   = document.getElementById('eventNotes');
  const saveBtn      = document.getElementById('saveBtn');
  const cancelBtn    = document.getElementById('cancelBtn');

  function switchUser() {
    localStorage.removeItem(CODE_KEY);
    localStorage.removeItem(NAME_KEY);
    window.location.href = '/';
  }

  // ── Load events ───────────────────────────────────────────────────────
  async function loadEvents() {
    try {
      const res  = await fetch('/api/family/events', { headers: apiHeaders() });
      if (res.status === 401) { window.location.href = '/'; return; }
      const data = await res.json();
      cachedEvents = data.events;
      renderAll();
    } catch {
      document.getElementById('calGrid').innerHTML =
        `<p style="color:var(--ink-2);padding:40px;font-size:0.85rem;grid-column:1/-1;">${t().loadErr}</p>`;
    }
  }

  setInterval(loadEvents, 30000);

  // ── Build event-by-date index ─────────────────────────────────────────
  function buildEventIndex(events) {
    const idx = {};
    for (const ev of events) {
      if (!ev.date) continue;
      if (!idx[ev.date]) idx[ev.date] = [];
      idx[ev.date].push(ev);
    }
    return idx;
  }

  // ── Render all ────────────────────────────────────────────────────────
  function renderAll() {
    const index = buildEventIndex(cachedEvents);
    renderDayPanels(index);
    renderCalendar(activeMonth, index);
  }

  // ── Day panels ────────────────────────────────────────────────────────
  function renderDayPanels(index) {
    const tr      = t();
    const today   = new Date();
    const todayISO = toDateISO(today);
    const tomorrow = new Date(today);
    tomorrow.setDate(today.getDate() + 1);
    const tomorrowISO = toDateISO(tomorrow);

    document.getElementById('todayLabel').textContent    = tr.today;
    document.getElementById('tomorrowLabel').textContent = tr.tomorrow;
    document.getElementById('todayDate').textContent     = formatDayDate(today, currentLang);
    document.getElementById('tomorrowDate').textContent  = formatDayDate(tomorrow, currentLang);

    renderDayEventList('today',    index[todayISO]    || [], tr);
    renderDayEventList('tomorrow', index[tomorrowISO] || [], tr);
  }

  function renderDayEventList(id, events, tr) {
    const listEl  = document.getElementById(`${id}List`);
    const emptyEl = document.getElementById(`${id}Empty`);

    listEl.innerHTML = '';

    if (events.length === 0) {
      listEl.style.display  = 'none';
      emptyEl.style.display = 'block';
      return;
    }

    const ul = document.createElement('ul');
    ul.className = 'event-list';
    events.forEach((ev, i) => ul.appendChild(buildEventEl(ev, i, tr)));
    listEl.appendChild(ul);
    listEl.style.display  = 'block';
    emptyEl.style.display = 'none';
  }

  // ── Weekday headers ───────────────────────────────────────────────────
  function renderWeekdayHeaders(lang) {
    const container = document.getElementById('calWeekdays');
    container.innerHTML = '';
    for (const name of T[lang].weekdays) {
      const el = document.createElement('span');
      el.className   = 'cal-weekday';
      el.textContent = name;
      container.appendChild(el);
    }
  }

  // ── Calendar grid ─────────────────────────────────────────────────────
  function renderCalendar(monthKey, index) {
    document.getElementById('monthNavHeading').textContent = monthLabel(monthKey, currentLang);

    const todayISO      = toDateISO(new Date());
    const [year, month] = monthKey.split('-').map(Number);
    const firstDow      = (new Date(year, month - 1, 1).getDay() + 6) % 7; // Mon = 0
    const daysInMonth   = new Date(year, month, 0).getDate();

    const prevYear  = month === 1 ? year - 1 : year;
    const prevMonth = month === 1 ? 12 : month - 1;
    const prevDays  = new Date(prevYear, prevMonth, 0).getDate();
    const nextYear  = month === 12 ? year + 1 : year;
    const nextMonth = month === 12 ? 1 : month + 1;

    const cells = [];

    for (let i = firstDow - 1; i >= 0; i--) {
      const day     = prevDays - i;
      const dateKey = `${prevYear}-${String(prevMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      cells.push({ day, dateKey, thisMonth: false });
    }
    for (let day = 1; day <= daysInMonth; day++) {
      const dateKey = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      cells.push({ day, dateKey, thisMonth: true });
    }
    const remaining = (7 - (cells.length % 7)) % 7;
    for (let day = 1; day <= remaining; day++) {
      const dateKey = `${nextYear}-${String(nextMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      cells.push({ day, dateKey, thisMonth: false });
    }

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    for (const { day, dateKey, thisMonth } of cells) {
      const cell = document.createElement('div');
      cell.className = 'cal-day';
      if (!thisMonth)           cell.classList.add('other-month');
      if (dateKey === todayISO) cell.classList.add('today');

      const num = document.createElement('span');
      num.className   = 'cal-day-num';
      num.textContent = day;
      cell.appendChild(num);

      const dayEvents = (index || {})[dateKey] || [];
      const shown     = dayEvents.slice(0, 2);
      const extra     = dayEvents.length - shown.length;

      for (const ev of shown) {
        const el = document.createElement('span');
        el.className   = 'cal-item';
        el.textContent = ev.title;
        cell.appendChild(el);
      }

      if (extra > 0) {
        const more = document.createElement('span');
        more.className   = 'cal-item-more';
        more.textContent = `+${extra}`;
        cell.appendChild(more);
      }

      grid.appendChild(cell);
    }
  }

  // ── Month navigation ──────────────────────────────────────────────────
  document.getElementById('prevMonth').addEventListener('click', () => {
    activeMonth = stepMonth(activeMonth, -1);
    renderCalendar(activeMonth, buildEventIndex(cachedEvents));
  });

  document.getElementById('nextMonth').addEventListener('click', () => {
    activeMonth = stepMonth(activeMonth, 1);
    renderCalendar(activeMonth, buildEventIndex(cachedEvents));
  });

  // ── Build event card element ──────────────────────────────────────────
  function buildEventEl(event, delay, tr) {
    const li = document.createElement('li');
    li.className = 'event-item';
    li.style.animationDelay = `${delay * 40}ms`;

    const top = document.createElement('div');
    top.className = 'event-top';

    const titleEl = document.createElement('span');
    titleEl.className   = 'event-title';
    titleEl.textContent = event.title;
    top.appendChild(titleEl);

    if (event.createdBy === familyName) {
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-delete-event';
      delBtn.setAttribute('aria-label', 'Delete event');
      delBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1.5 3h10M4.5 3V1.5h4V3M3 3l.6 8h5.8L10 3"/></svg>`;
      delBtn.addEventListener('click', () => deleteEvent(event.id));
      top.appendChild(delBtn);
    }
    li.appendChild(top);

    const meta = document.createElement('p');
    meta.className   = 'event-meta';
    meta.textContent = tr.addedBy(event.createdBy);
    li.appendChild(meta);

    if (event.notes) {
      const notes = document.createElement('p');
      notes.className   = 'event-notes';
      notes.textContent = event.notes;
      li.appendChild(notes);
    }

    const reactionRow = document.createElement('div');
    reactionRow.className = 'reaction-row';

    const names = document.createElement('div');
    names.className = 'reaction-names';
    const ups   = Object.entries(event.reactions).filter(([, v]) => v === 'up').map(([k]) => k);
    const downs = Object.entries(event.reactions).filter(([, v]) => v === 'down').map(([k]) => k);

    if (ups.length || downs.length) {
      if (ups.length) {
        const s = document.createElement('span');
        s.innerHTML = `<span>👍</span>${ups.join(', ')}`;
        names.appendChild(s);
      }
      if (downs.length) {
        const s = document.createElement('span');
        s.innerHTML = `<span>👎</span>${downs.join(', ')}`;
        names.appendChild(s);
      }
    } else {
      names.textContent = tr.noResponses;
    }
    reactionRow.appendChild(names);

    const myReaction = event.reactions[familyName];
    const btns = document.createElement('div');
    btns.className = 'react-btns';

    const upBtn = document.createElement('button');
    upBtn.className   = 'react-btn' + (myReaction === 'up' ? ' active-up' : '');
    upBtn.textContent = tr.going;
    upBtn.addEventListener('click', () => react(event.id, myReaction === 'up' ? null : 'up'));

    const downBtn = document.createElement('button');
    downBtn.className   = 'react-btn' + (myReaction === 'down' ? ' active-down' : '');
    downBtn.textContent = tr.cantMake;
    downBtn.addEventListener('click', () => react(event.id, myReaction === 'down' ? null : 'down'));

    btns.appendChild(upBtn);
    btns.appendChild(downBtn);
    reactionRow.appendChild(btns);
    li.appendChild(reactionRow);

    return li;
  }

  // ── Add event ─────────────────────────────────────────────────────────
  addBtn.addEventListener('click', () => {
    addForm.classList.toggle('open');
    if (addForm.classList.contains('open')) eventTitle.focus();
  });

  cancelBtn.addEventListener('click', () => {
    addForm.classList.remove('open');
    eventTitle.value = '';
    eventDate.value  = '';
    eventNotes.value = '';
  });

  saveBtn.addEventListener('click', async () => {
    const title = eventTitle.value.trim();
    if (!title) { eventTitle.focus(); return; }

    saveBtn.disabled    = true;
    saveBtn.textContent = t().adding;
    try {
      const res = await fetch('/api/family/events', {
        method:  'POST',
        headers: apiHeaders(),
        body:    JSON.stringify({
          title,
          date:      eventDate.value || null,
          notes:     eventNotes.value.trim() || '',
          createdBy: familyName,
        }),
      });
      const data = await res.json();
      if (!res.ok) { alert(data.error); return; }
      cancelBtn.click();
      // Navigate to the month of the newly added event
      if (eventDate.value) activeMonth = eventDate.value.slice(0, 7);
      loadEvents();
    } catch {
      alert(t().saveErr);
    } finally {
      saveBtn.disabled    = false;
      saveBtn.textContent = t().addEvent;
    }
  });

  // ── React ─────────────────────────────────────────────────────────────
  async function react(eventId, reaction) {
    try {
      await fetch(`/api/family/events/${eventId}/react`, {
        method:  'POST',
        headers: apiHeaders(),
        body:    JSON.stringify({ name: familyName, reaction }),
      });
      loadEvents();
    } catch {}
  }

  // ── Delete ────────────────────────────────────────────────────────────
  async function deleteEvent(eventId) {
    if (!confirm(t().deleteConfirm)) return;
    try {
      await fetch(`/api/family/events/${eventId}`, {
        method: 'DELETE', headers: apiHeaders(),
      });
      loadEvents();
    } catch {}
  }

  // ── Voice recording ───────────────────────────────────────────────────
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn            = document.getElementById('micBtn');
  const micLabel          = document.getElementById('micLabel');
  const voiceStatus       = document.getElementById('voiceStatus');
  let   recognition       = null;

  if (!SpeechRecognition) {
    micBtn.disabled = true;
    micBtn.title    = 'Voice input requires Chrome or Edge.';
  } else {
    recognition                = new SpeechRecognition();
    recognition.continuous     = true;
    recognition.interimResults = true;
    recognition.lang           = T[currentLang].voiceLang;

    let finalTranscript = '';

    recognition.addEventListener('result', (e) => {
      let interim = '';
      finalTranscript = '';
      for (const result of e.results) {
        if (result.isFinal) finalTranscript += result[0].transcript + ' ';
        else interim += result[0].transcript;
      }
      eventTitle.value = (finalTranscript + interim).trim();
    });

    recognition.addEventListener('end', () => {
      if (!recording) return;
      recording = false;
      micBtn.classList.remove('recording');
      micLabel.textContent    = t().record;
      voiceStatus.textContent = '';
      voiceStatus.className   = 'voice-status';

      const text = finalTranscript.trim();
      if (!text) {
        voiceStatus.textContent = t().notHeard;
        voiceStatus.className   = 'voice-status error';
        return;
      }
      eventTitle.value = text;
      if (!addForm.classList.contains('open')) addForm.classList.add('open');
      eventDate.focus();
    });

    recognition.addEventListener('error', (e) => {
      recording = false;
      micBtn.classList.remove('recording');
      micLabel.textContent    = t().record;
      voiceStatus.className   = 'voice-status error';
      voiceStatus.textContent = e.error === 'not-allowed'
        ? t().micDenied
        : `${t().voiceErr}${e.error}`;
    });

    micBtn.addEventListener('click', () => {
      if (recording) { recognition.stop(); return; }
      finalTranscript         = '';
      eventTitle.value        = '';
      recording               = true;
      micBtn.classList.add('recording');
      micLabel.textContent    = t().stop;
      voiceStatus.textContent = t().listening;
      voiceStatus.className   = 'voice-status';
      if (!addForm.classList.contains('open')) addForm.classList.add('open');
      recognition.start();
    });
  }

  // ── Language toggle ───────────────────────────────────────────────────
  document.getElementById('langEn').addEventListener('click', () => applyLang('en'));
  document.getElementById('langSv').addEventListener('click', () => applyLang('sv'));

  // ── Init ──────────────────────────────────────────────────────────────
  if (!familyCode || !familyName) {
    window.location.replace('/');
  } else {
    applyLang(currentLang);
    mastheadUser.innerHTML = `${familyName} <button id="switchBtn">${t().notYou}</button>`;
    mastheadUser.style.display = 'inline';
    document.getElementById('switchBtn').addEventListener('click', switchUser);
    renderWeekdayHeaders(currentLang);
    renderAll();
    loadEvents();
  }
</script>
</body>
</html>

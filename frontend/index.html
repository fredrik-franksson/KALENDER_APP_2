<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">BrainDump — Group Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:   #F3F1EC;
      --ink:     #0F0F0E;
      --ink-2:   #6E6B66;
      --rule:    #CBC8C2;
      --surface: #E7E5E0;
      --green:   #1B3D2C;
      --red:     #B91C1C;
    }

    html { font-size: 16px; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 48px;
    }
    @media (max-width: 600px) { .wrap { padding: 0 20px; } }

    /* ── Masthead ── */
    .masthead {
      padding: 32px 0 24px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid var(--ink);
    }
    .masthead-left {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .masthead-wordmark {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
    }
    .masthead-sep {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--rule);
    }
    .masthead-section {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
    }
    .masthead-right {
      display: flex;
      align-items: baseline;
      gap: 20px;
    }
    .masthead-date {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--ink-2);
    }

    /* ── Language toggle ── */
    .lang-toggle { display: flex; align-items: center; gap: 7px; }
    .lang-btn {
      background: none;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      color: var(--ink-2);
      padding: 0;
      transition: color 0.15s;
    }
    .lang-btn.active { color: var(--ink); }
    .lang-btn:hover  { color: var(--ink); }
    .lang-sep {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--rule);
      user-select: none;
    }

    /* ── Connect section ── */
    .connect-wrap {
      max-width: 440px;
      margin: 80px auto 0;
    }

    /* ── Mode tabs ── */
    .mode-tabs {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }
    .mode-tab {
      background: none;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-2);
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }
    .mode-tab.active { color: var(--ink); }
    .mode-tab:hover  { color: var(--ink); }
    .mode-sep {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--rule);
      user-select: none;
    }

    /* ── Headings ── */
    .connect-heading {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(2.4rem, 4vw, 3.2rem);
      line-height: 1.1;
      margin-bottom: 44px;
    }

    /* ── Fields ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 28px;
    }
    .field-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-2);
    }
    .field-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--rule);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: var(--ink);
      padding: 10px 0;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .field-input:focus { border-bottom-color: var(--ink); }
    .field-input::placeholder { color: var(--ink-2); font-style: italic; }

    /* ── Buttons ── */
    .connect-btn {
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 13px 36px;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
      margin-top: 8px;
    }
    .connect-btn:hover:not(:disabled) { background: var(--green); }
    .connect-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Error line ── */
    .connect-error {
      margin-top: 14px;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--red);
      display: none;
    }

    /* ── Success state ── */
    .success-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 10px;
    }
    .success-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-2);
      margin-bottom: 10px;
      margin-top: 32px;
    }
    .code-box {
      display: flex;
      align-items: stretch;
      gap: 0;
      margin-bottom: 16px;
    }
    .code-display {
      flex: 1;
      font-family: 'Space Mono', monospace;
      font-size: 1.9rem;
      letter-spacing: 0.3em;
      color: var(--ink);
      text-align: center;
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-right: none;
      user-select: all;
    }
    .btn-copy {
      background: none;
      border: 1px solid var(--rule);
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-2);
      padding: 0 16px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-copy:hover  { border-color: var(--ink); color: var(--ink); }
    .btn-copy.copied { color: var(--green); border-color: var(--green); background: rgba(27,61,44,0.06); }

    .success-note {
      font-size: 0.82rem;
      color: var(--ink-2);
      line-height: 1.55;
      margin-bottom: 32px;
    }

    .btn-goto {
      background: none;
      border: 1px solid var(--ink);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 13px 36px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      width: 100%;
    }
    .btn-goto:hover { background: var(--ink); color: var(--paper); }

    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="masthead">
      <div class="masthead-left">
        <a href="/braindump.html" class="masthead-wordmark">BrainDump</a>
        <span class="masthead-sep">/</span>
        <span class="masthead-section" id="mastheadSection">Group Schedule</span>
      </div>
      <div class="masthead-right">
        <div class="lang-toggle">
          <button class="lang-btn active" id="langEn">EN</button>
          <span class="lang-sep">·</span>
          <button class="lang-btn" id="langSv">SV</button>
        </div>
        <span class="masthead-date" id="mastheadDate"></span>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <div class="connect-wrap">

      <!-- Mode tabs -->
      <div class="mode-tabs">
        <button class="mode-tab active" id="tabJoin">Join</button>
        <span class="mode-sep">·</span>
        <button class="mode-tab" id="tabCreate">Create</button>
      </div>

      <!-- Join panel -->
      <div class="panel active" id="joinPanel">
        <h1 class="connect-heading" id="joinHeading">Join your group</h1>

        <div class="field">
          <label class="field-label" id="codeLabel" for="joinCode">Group code</label>
          <input class="field-input" type="text" id="joinCode" autocomplete="off" autocapitalize="characters" />
        </div>
        <div class="field">
          <label class="field-label" id="joinNameLabel" for="joinName">Your first name</label>
          <input class="field-input" type="text" id="joinName" autocomplete="given-name" />
        </div>
        <button class="connect-btn" id="joinBtn">Join</button>
        <p class="connect-error" id="joinError"></p>
      </div>

      <!-- Create panel -->
      <div class="panel" id="createPanel">
        <h1 class="connect-heading" id="createHeading">Create a group</h1>

        <div class="field">
          <label class="field-label" id="groupNameLabel" for="groupName">Group name</label>
          <input class="field-input" type="text" id="groupName" />
        </div>
        <div class="field">
          <label class="field-label" id="createNameLabel" for="createName">Your first name</label>
          <input class="field-input" type="text" id="createName" autocomplete="given-name" />
        </div>
        <button class="connect-btn" id="createBtn">Create</button>
        <p class="connect-error" id="createError"></p>
      </div>

      <!-- Success panel (after create) -->
      <div class="panel" id="successPanel">
        <p class="success-eyebrow" id="successEyebrow">Group created</p>
        <h1 class="connect-heading" id="successHeading">Share your code</h1>

        <p class="success-label" id="yourCodeLabel">Group code</p>
        <div class="code-box">
          <span class="code-display" id="createdCode"></span>
          <button class="btn-copy" id="copyBtn">Copy</button>
        </div>
        <p class="success-note" id="successNote">Share this code with everyone in your group so they can join.</p>

        <button class="btn-goto" id="gotoBtn">→ Go to calendar</button>
      </div>

    </div>
  </div>
</main>

<script>
  // ── Translations ──────────────────────────────────────────────────────
  const T = {
    en: {
      pageTitle:          'BrainDump — Group Schedule',
      sectionName:        'Group Schedule',
      tabJoin:            'Join',
      tabCreate:          'Create',
      joinHeading:        'Join your group',
      createHeading:      'Create a group',
      successEyebrow:     'Group created',
      successHeading:     'Share your code',
      codeLabel:          'Group code',
      codePlaceholder:    'e.g. ABC123',
      joinNameLabel:      'Your first name',
      namePlaceholder:    'Your name…',
      groupNameLabel:     'Group name',
      groupPlaceholder:   'Smith Family, Book Club…',
      createNameLabel:    'Your first name',
      joinBtn:            'Join',
      joining:            'Joining…',
      createBtn:          'Create',
      creating:           'Creating…',
      copy:               'Copy',
      copied:             'Copied',
      gotoBtn:            '→ Go to calendar',
      yourCodeLabel:      'Group code',
      successNote:        'Share this code with everyone who should join the group.',
      joinRequired:       'Please enter the group code and your name.',
      createRequired:     'Please enter a group name and your name.',
      wrongCode:          'Wrong group code.',
      connectErr:         'Could not connect — please try again.',
    },
    sv: {
      pageTitle:          'BrainDump — Gruppschemat',
      sectionName:        'Gruppschemat',
      tabJoin:            'Gå med',
      tabCreate:          'Skapa',
      joinHeading:        'Gå med i gruppen',
      createHeading:      'Skapa en grupp',
      successEyebrow:     'Grupp skapad',
      successHeading:     'Dela din kod',
      codeLabel:          'Gruppkod',
      codePlaceholder:    't.ex. ABC123',
      joinNameLabel:      'Ditt förnamn',
      namePlaceholder:    'Ditt namn…',
      groupNameLabel:     'Gruppnamn',
      groupPlaceholder:   'Familjen, Bokklubben…',
      createNameLabel:    'Ditt förnamn',
      joinBtn:            'Gå med',
      joining:            'Ansluter…',
      createBtn:          'Skapa',
      creating:           'Skapar…',
      copy:               'Kopiera',
      copied:             'Kopierat',
      gotoBtn:            '→ Gå till kalender',
      yourCodeLabel:      'Gruppkod',
      successNote:        'Dela denna kod med alla som ska ansluta till gruppen.',
      joinRequired:       'Ange gruppkoden och ditt namn.',
      createRequired:     'Ange ett gruppnamn och ditt namn.',
      wrongCode:          'Fel gruppkod.',
      connectErr:         'Kunde inte ansluta — försök igen.',
    },
  };

  const LANG_KEY = 'braindump_lang';
  const DAYS = {
    en: ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],
    sv: ['söndag','måndag','tisdag','onsdag','torsdag','fredag','lördag'],
  };
  const MONTHS = {
    en: ['January','February','March','April','May','June','July','August','September','October','November','December'],
    sv: ['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'],
  };

  let currentLang = localStorage.getItem(LANG_KEY) || 'en';
  const t = () => T[currentLang];

  function formatDate(lang) {
    const d = new Date();
    return `${DAYS[lang][d.getDay()]} ${d.getDate()} ${MONTHS[lang][d.getMonth()]} ${d.getFullYear()}`;
  }

  // ── Redirect if already connected ────────────────────────────────────
  const CODE_KEY       = 'family_code';
  const NAME_KEY       = 'family_name';
  const GROUP_NAME_KEY = 'family_group_name';

  if (localStorage.getItem(CODE_KEY) && localStorage.getItem(NAME_KEY)) {
    window.location.replace('/family.html');
  }

  // ── Apply language ────────────────────────────────────────────────────
  function applyLang(lang) {
    currentLang = lang;
    localStorage.setItem(LANG_KEY, lang);

    document.getElementById('langEn').classList.toggle('active', lang === 'en');
    document.getElementById('langSv').classList.toggle('active', lang === 'sv');

    const tr = T[lang];
    document.title                                              = tr.pageTitle;
    document.getElementById('mastheadSection').textContent     = tr.sectionName;
    document.getElementById('mastheadDate').textContent        = formatDate(lang);
    document.getElementById('tabJoin').textContent             = tr.tabJoin;
    document.getElementById('tabCreate').textContent           = tr.tabCreate;
    document.getElementById('joinHeading').textContent         = tr.joinHeading;
    document.getElementById('createHeading').textContent       = tr.createHeading;
    document.getElementById('successEyebrow').textContent      = tr.successEyebrow;
    document.getElementById('successHeading').textContent      = tr.successHeading;
    document.getElementById('codeLabel').textContent                = tr.codeLabel;
    document.getElementById('joinCode').placeholder                 = tr.codePlaceholder;
    document.getElementById('joinNameLabel').textContent            = tr.joinNameLabel;
    document.getElementById('joinName').placeholder                 = tr.namePlaceholder;
    document.getElementById('groupNameLabel').textContent           = tr.groupNameLabel;
    document.getElementById('groupName').placeholder                = tr.groupPlaceholder;
    document.getElementById('createNameLabel').textContent          = tr.createNameLabel;
    document.getElementById('createName').placeholder               = tr.namePlaceholder;
    document.getElementById('joinBtn').textContent                  = tr.joinBtn;
    document.getElementById('createBtn').textContent                = tr.createBtn;
    document.getElementById('copyBtn').textContent                  = tr.copy;
    document.getElementById('gotoBtn').textContent                  = tr.gotoBtn;
    document.getElementById('yourCodeLabel').textContent            = tr.yourCodeLabel;
    document.getElementById('successNote').textContent              = tr.successNote;
  }

  document.getElementById('mastheadDate').textContent = formatDate(currentLang);

  // ── Tab switching ────────────────────────────────────────────────────
  const panels = { join: 'joinPanel', create: 'createPanel', success: 'successPanel' };

  function showPanel(name) {
    for (const [key, id] of Object.entries(panels)) {
      document.getElementById(id).classList.toggle('active', key === name);
    }
    document.getElementById('tabJoin').classList.toggle('active', name === 'join');
    document.getElementById('tabCreate').classList.toggle('active', name === 'create' || name === 'success');
  }

  document.getElementById('tabJoin').addEventListener('click', () => showPanel('join'));
  document.getElementById('tabCreate').addEventListener('click', () => showPanel('create'));

  // ── Error helpers ────────────────────────────────────────────────────
  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent   = `↳ ${msg}`;
    el.style.display = 'block';
  }
  function clearError(id) {
    document.getElementById(id).style.display = 'none';
  }

  // ── Join ─────────────────────────────────────────────────────────────
  const joinBtn = document.getElementById('joinBtn');
  joinBtn.addEventListener('click', async () => {
    clearError('joinError');
    const code = document.getElementById('joinCode').value.trim().toUpperCase();
    const name = document.getElementById('joinName').value.trim();
    if (!code || !name) { showError('joinError', t().joinRequired); return; }

    joinBtn.disabled    = true;
    joinBtn.textContent = t().joining;
    try {
      const res  = await fetch('/api/family/join', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ code, name }),
      });
      const data = await res.json();
      if (!res.ok) {
        showError('joinError', t().wrongCode);
        return;
      }
      localStorage.setItem(CODE_KEY, code);
      localStorage.setItem(NAME_KEY, name);
      localStorage.setItem(GROUP_NAME_KEY, data.groupName || '');
      window.location.href = '/family.html';
    } catch {
      showError('joinError', t().connectErr);
    } finally {
      joinBtn.disabled    = false;
      joinBtn.textContent = t().joinBtn;
    }
  });

  document.getElementById('joinName').addEventListener('keydown', e => { if (e.key === 'Enter') joinBtn.click(); });
  document.getElementById('joinCode').addEventListener('keydown', e => { if (e.key === 'Enter') joinBtn.click(); });

  // ── Create ───────────────────────────────────────────────────────────
  const createBtn = document.getElementById('createBtn');
  createBtn.addEventListener('click', async () => {
    clearError('createError');
    const groupName = document.getElementById('groupName').value.trim();
    const name      = document.getElementById('createName').value.trim();
    if (!groupName || !name) { showError('createError', t().createRequired); return; }

    createBtn.disabled    = true;
    createBtn.textContent = t().creating;
    try {
      const res  = await fetch('/api/family/create', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ groupName, name }),
      });
      const data = await res.json();
      if (!res.ok) { showError('createError', data.error); return; }

      localStorage.setItem(CODE_KEY, data.code);
      localStorage.setItem(NAME_KEY, name);
      localStorage.setItem(GROUP_NAME_KEY, data.groupName);

      document.getElementById('createdCode').textContent = data.code;
      showPanel('success');
    } catch {
      showError('createError', t().connectErr);
    } finally {
      createBtn.disabled    = false;
      createBtn.textContent = t().createBtn;
    }
  });

  document.getElementById('createName').addEventListener('keydown', e => { if (e.key === 'Enter') createBtn.click(); });

  // ── Copy code ────────────────────────────────────────────────────────
  document.getElementById('copyBtn').addEventListener('click', async () => {
    const code  = document.getElementById('createdCode').textContent;
    const btn   = document.getElementById('copyBtn');
    try {
      await navigator.clipboard.writeText(code);
      btn.textContent = t().copied;
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = t().copy;
        btn.classList.remove('copied');
      }, 2000);
    } catch {
      // Clipboard unavailable — ignore
    }
  });

  // ── Go to calendar ───────────────────────────────────────────────────
  document.getElementById('gotoBtn').addEventListener('click', () => {
    window.location.href = '/family.html';
  });

  // ── Language toggle ───────────────────────────────────────────────────
  document.getElementById('langEn').addEventListener('click', () => applyLang('en'));
  document.getElementById('langSv').addEventListener('click', () => applyLang('sv'));

  // ── Init ─────────────────────────────────────────────────────────────
  applyLang(currentLang);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrainDump</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:   #F3F1EC;
      --ink:     #0F0F0E;
      --ink-2:   #6E6B66;
      --rule:    #CBC8C2;
      --surface: #E7E5E0;
      --green:   #1B3D2C;
      --red:     #B91C1C;
    }

    html { font-size: 16px; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Wrap ── */
    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 48px;
    }

    @media (max-width: 600px) {
      .wrap { padding: 0 20px; }
    }

    /* ── Masthead ── */
    .masthead {
      padding: 32px 0 24px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid var(--ink);
    }

    .masthead-wordmark {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .masthead-family {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--ink-2);
      text-decoration: none;
      transition: color 0.15s;
      margin-left: 16px;
    }
    .masthead-family:hover { color: var(--ink); }

    .masthead-date {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--ink-2);
      text-align: right;
    }

    /* ── Language toggle ── */
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .lang-btn {
      background: none;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      color: var(--ink-2);
      padding: 0;
      transition: color 0.15s;
    }

    .lang-btn.active { color: var(--ink); }
    .lang-btn:hover  { color: var(--ink); }

    .lang-sep {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--rule);
      user-select: none;
    }

    /* ── Input section ── */
    .input-section {
      padding: 52px 0 44px;
      border-bottom: 1px solid var(--rule);
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-2);
      margin-bottom: 22px;
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--rule);
      font-family: 'DM Sans', sans-serif;
      font-size: 1.05rem;
      font-weight: 300;
      line-height: 1.65;
      color: var(--ink);
      padding: 0 0 18px;
      resize: none;
      outline: none;
      min-height: 100px;
      transition: border-color 0.2s;
    }

    textarea::placeholder {
      color: var(--ink-2);
      font-style: italic;
    }

    textarea:focus {
      border-bottom-color: var(--ink);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 22px;
    }

    .btn-process {
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 11px 28px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-process:hover:not(:disabled) { background: var(--green); }
    .btn-process:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-mic {
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      padding: 10px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: border-color 0.15s;
    }

    .btn-mic:hover:not(:disabled) { border-color: var(--ink); }
    .btn-mic:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-mic.recording {
      border-color: var(--red);
      color: var(--red);
    }

    .mic-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1px solid currentColor;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .btn-mic.recording .mic-dot {
      background: var(--red);
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-line {
      margin-top: 18px;
      font-size: 0.8rem;
      color: var(--ink-2);
      font-style: italic;
      min-height: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      width: 12px;
      height: 12px;
      border: 1.5px solid var(--rule);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-line {
      margin-top: 14px;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--red);
      display: none;
    }

    /* ── Sections ── */
    .sections {
      padding-bottom: 100px;
    }

    .section {
      display: grid;
      grid-template-columns: 230px 1fr;
      column-gap: 56px;
      padding: 44px 0;
      border-bottom: 1px solid var(--rule);
      align-items: start;
    }

    @media (max-width: 680px) {
      .section {
        grid-template-columns: 1fr;
        row-gap: 18px;
        padding: 32px 0;
      }
    }

    .section-label { padding-top: 2px; }

    .section-name {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(2.8rem, 3.8vw, 3.8rem);
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .section-count {
      display: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      color: var(--ink-2);
      margin-top: 8px;
      letter-spacing: 0.04em;
    }

    /* ── Items ── */
    .empty-state {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      color: var(--rule);
      padding-top: 6px;
      user-select: none;
    }

    .item-list {
      list-style: none;
      display: none;
    }

    .item-list li {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0 16px;
      padding: 12px 0;
      border-bottom: 1px solid var(--surface);
      font-size: 0.95rem;
      font-weight: 300;
      line-height: 1.5;
      animation: fadeUp 0.25s ease both;
    }

    .item-note {
      flex-basis: 100%;
      font-size: 0.78rem;
      color: var(--ink-2);
      font-style: italic;
      margin-top: 4px;
      padding-left: 1px;
    }

    .item-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--rule);
      padding: 2px 0 2px 8px;
      flex-shrink: 0;
      line-height: 0;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }

    .item-list li:hover .item-delete { opacity: 1; }
    .item-delete:hover { color: var(--red); }

    .item-list li:last-child { border-bottom: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-title { flex: 1; }

    .item-when {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--ink-2);
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 2px;
    }

    /* Urgent */
    .item-list li.urgent {
      padding-left: 14px;
      border-left: 2px solid var(--red);
    }

    .item-list li.urgent .item-title { color: var(--red); }

    .item-urgent-tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      color: var(--red);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .item-list li { animation: none; }
      .spinner      { animation: none; }
      .mic-dot      { animation: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="masthead">
      <span class="masthead-wordmark">BrainDump</span>
        <a href="/family.html" class="masthead-family" id="familyLink">Group Schedule</a>
      <div class="lang-toggle">
        <button class="lang-btn active" id="langEn">EN</button>
        <span class="lang-sep">·</span>
        <button class="lang-btn" id="langSv">SV</button>
      </div>
      <span class="masthead-date" id="mastheadDate"></span>
    </div>
  </div>
</header>

<main>
  <div class="wrap">

    <section class="input-section">
      <p class="eyebrow" id="eyebrow">New entry</p>
      <textarea id="inputText" placeholder="What's on your mind…" rows="4"></textarea>
      <div class="controls">
        <button class="btn-process" id="processBtn">Process</button>
        <button class="btn-mic" id="micBtn">
          <span class="mic-dot"></span>
          <span id="micLabel">Record</span>
        </button>
      </div>
      <div class="status-line" id="status"></div>
      <div class="error-line" id="error"></div>
    </section>

    <div class="sections">

      <div class="section" data-group="Today">
        <div class="section-label">
          <span class="section-name" id="section-name-Today">Today</span>
          <span class="section-count" id="count-Today"></span>
        </div>
        <div>
          <p class="empty-state" id="empty-Today">—</p>
          <ul class="item-list" id="list-Today"></ul>
        </div>
      </div>

      <div class="section" data-group="This Week">
        <div class="section-label">
          <span class="section-name" id="section-name-This Week">This Week</span>
          <span class="section-count" id="count-This Week"></span>
        </div>
        <div>
          <p class="empty-state" id="empty-This Week">—</p>
          <ul class="item-list" id="list-This Week"></ul>
        </div>
      </div>

      <div class="section" data-group="Next Week">
        <div class="section-label">
          <span class="section-name" id="section-name-Next Week">Next Week</span>
          <span class="section-count" id="count-Next Week"></span>
        </div>
        <div>
          <p class="empty-state" id="empty-Next Week">—</p>
          <ul class="item-list" id="list-Next Week"></ul>
        </div>
      </div>

      <div class="section" data-group="Upcoming">
        <div class="section-label">
          <span class="section-name" id="section-name-Upcoming">Upcoming</span>
          <span class="section-count" id="count-Upcoming"></span>
        </div>
        <div>
          <p class="empty-state" id="empty-Upcoming">—</p>
          <ul class="item-list" id="list-Upcoming"></ul>
        </div>
      </div>

    </div>
  </div>
</main>

<script>
  // ── Translations ───────────────────────────────────────────────────────
  const T = {
    en: {
      dateLocale:  'en-GB',
      voiceLang:   'en-US',
      eyebrow:     'New entry',
      placeholder: "What's on your mind…",
      process:     'Process',
      record:      'Record',
      stop:        'Stop',
      processing:  'Processing…',
      listening:   'Listening…',
      nothing:     'Nothing to process — write something first.',
      notHeard:    'Nothing was heard — please try again.',
      micDenied:   'Microphone access denied.',
      voiceErr:    'Voice error: ',
      sections:      { Today: 'Today', 'This Week': 'This Week', 'Next Week': 'Next Week', Upcoming: 'Upcoming' },
      urgentTag:     'urgent',
      itemCount:     (n) => `${n} item${n !== 1 ? 's' : ''}`,
      groupSchedule: 'Group Schedule',
    },
    sv: {
      dateLocale:  'sv-SE',
      voiceLang:   'sv-SE',
      eyebrow:     'Ny anteckning',
      placeholder: 'Vad har du på hjärtat…',
      process:     'Bearbeta',
      record:      'Spela in',
      stop:        'Stopp',
      processing:  'Bearbetar…',
      listening:   'Lyssnar…',
      nothing:     'Inget att bearbeta — skriv något först.',
      notHeard:    'Inget hördes — försök igen.',
      micDenied:   'Mikrofonåtkomst nekad.',
      voiceErr:    'Röstfel: ',
      sections:      { Today: 'Idag', 'This Week': 'Den här veckan', 'Next Week': 'Nästa vecka', Upcoming: 'Kommande' },
      urgentTag:     'brådskande',
      itemCount:     (n) => `${n} uppgift${n !== 1 ? 'er' : ''}`,
      groupSchedule: 'Gruppschemat',
    },
  };

  const LANG_KEY   = 'braindump_lang';
  let currentLang  = localStorage.getItem(LANG_KEY) || 'en';
  const t          = () => T[currentLang];

  const textarea   = document.getElementById('inputText');
  const micBtn     = document.getElementById('micBtn');
  const micLabel   = document.getElementById('micLabel');
  const processBtn = document.getElementById('processBtn');
  const statusEl   = document.getElementById('status');
  const errorEl    = document.getElementById('error');

  const GROUPS      = ['Today', 'This Week', 'Next Week', 'Upcoming'];
  const STORAGE_KEY = 'braindump_items';
  let   recording   = false;

  // ── Date formatter (manual, bypasses browser locale bugs) ─────────────
  const DAYS = {
    en: ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],
    sv: ['söndag','måndag','tisdag','onsdag','torsdag','fredag','lördag'],
  };
  const MONTHS = {
    en: ['January','February','March','April','May','June','July','August','September','October','November','December'],
    sv: ['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'],
  };
  function formatDate(lang) {
    const d = new Date();
    const day   = DAYS[lang][d.getDay()];
    const date  = d.getDate();
    const month = MONTHS[lang][d.getMonth()];
    const year  = d.getFullYear();
    return `${day} ${date} ${month} ${year}`;
  }

  // ── Apply language to DOM ─────────────────────────────────────────────
  function applyLang(lang) {
    currentLang = lang;
    localStorage.setItem(LANG_KEY, lang);

    document.getElementById('langEn').classList.toggle('active', lang === 'en');
    document.getElementById('langSv').classList.toggle('active', lang === 'sv');

    const tr = T[lang];
    document.getElementById('eyebrow').textContent      = tr.eyebrow;
    textarea.placeholder                                = tr.placeholder;
    processBtn.textContent                              = tr.process;
    micLabel.textContent                                = recording ? tr.stop : tr.record;
    document.getElementById('mastheadDate').textContent = formatDate(lang);
    document.getElementById('familyLink').textContent  = tr.groupSchedule;

    for (const group of GROUPS) {
      document.getElementById(`section-name-${group}`).textContent = tr.sections[group];
    }

    if (recognition) recognition.lang = tr.voiceLang;

    populateSections(loadFromStorage());
  }

  // ── Masthead date (set initially) ─────────────────────────────────────
  document.getElementById('mastheadDate').textContent = formatDate(currentLang);

  // ── Markdown parser ───────────────────────────────────────────────────
  function parseMarkdown(md) {
    const result = {};
    let currentGroup = null;
    for (const line of md.split('\n')) {
      if (line.startsWith('## ')) {
        currentGroup = line.slice(3).trim();
        result[currentGroup] = result[currentGroup] || [];
      } else if (line.startsWith('- ') && currentGroup) {
        let raw = line.slice(2).trim();
        const urgent = raw.endsWith('[urgent]');
        if (urgent) raw = raw.slice(0, -8).trim();
        const whenMatch = raw.match(/\[([^\]]+)\]$/);
        const when  = whenMatch ? whenMatch[1] : null;
        const title = whenMatch ? raw.slice(0, whenMatch.index).trim() : raw;
        result[currentGroup].push({ title, when, urgent, notes: null });
      } else if (line.startsWith('  ↳ ') && currentGroup) {
        const group = result[currentGroup];
        if (group.length > 0) group[group.length - 1].notes = line.slice(4).trim();
      }
    }
    return result;
  }

  // ── Render sections ───────────────────────────────────────────────────
  function populateSections(grouped) {
    const tr = t();
    for (const group of GROUPS) {
      const items   = grouped[group] || [];
      const listEl  = document.getElementById(`list-${group}`);
      const emptyEl = document.getElementById(`empty-${group}`);
      const countEl = document.getElementById(`count-${group}`);

      listEl.innerHTML = '';

      if (items.length === 0) {
        listEl.style.display  = 'none';
        emptyEl.style.display = 'block';
        countEl.style.display = 'none';
      } else {
        items.forEach(({ title, when, urgent, notes }, i) => {
          const li = document.createElement('li');
          if (urgent) li.classList.add('urgent');
          li.style.animationDelay = `${i * 45}ms`;

          const titleSpan = document.createElement('span');
          titleSpan.className   = 'item-title';
          titleSpan.textContent = title;
          li.appendChild(titleSpan);

          if (when) {
            const whenSpan = document.createElement('span');
            whenSpan.className   = 'item-when';
            whenSpan.textContent = when;
            li.appendChild(whenSpan);
          }

          if (urgent) {
            const tag = document.createElement('span');
            tag.className   = 'item-urgent-tag';
            tag.textContent = tr.urgentTag;
            li.appendChild(tag);
          }

          const deleteBtn = document.createElement('button');
          deleteBtn.className   = 'item-delete';
          deleteBtn.setAttribute('aria-label', 'Remove item');
          deleteBtn.innerHTML   = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1.5 3h10M4.5 3V1.5h4V3M3 3l.6 8h5.8L10 3"/></svg>`;
          deleteBtn.addEventListener('click', () => deleteItem(group, title));
          li.appendChild(deleteBtn);

          if (notes) {
            const noteEl = document.createElement('span');
            noteEl.className   = 'item-note';
            noteEl.textContent = notes;
            li.appendChild(noteEl);
          }

          listEl.appendChild(li);
        });

        listEl.style.display  = 'block';
        emptyEl.style.display = 'none';
        countEl.textContent   = tr.itemCount(items.length);
        countEl.style.display = 'block';
      }
    }
  }

  // ── Storage ───────────────────────────────────────────────────────────
  function saveToStorage(grouped) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(grouped));
  }

  function loadFromStorage() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : {};
    } catch { return {}; }
  }

  function deleteItem(group, title) {
    const current = loadFromStorage();
    if (current[group]) {
      current[group] = current[group].filter(i => i.title !== title);
      if (current[group].length === 0) delete current[group];
    }
    saveToStorage(current);
    populateSections(current);
  }

  function mergeGrouped(existing, incoming) {
    const merged = JSON.parse(JSON.stringify(existing));
    for (const [group, items] of Object.entries(incoming)) {
      if (!merged[group]) {
        merged[group] = items;
      } else {
        const seen = new Set(merged[group].map(i => i.title.toLowerCase()));
        for (const item of items) {
          if (!seen.has(item.title.toLowerCase())) {
            merged[group].push(item);
            seen.add(item.title.toLowerCase());
          }
        }
      }
    }
    return merged;
  }

  // ── UI state ──────────────────────────────────────────────────────────
  function setLoading(msg) {
    statusEl.innerHTML    = `<div class="spinner"></div><span>${msg}</span>`;
    errorEl.style.display = 'none';
    processBtn.disabled   = true;
    micBtn.disabled       = true;
  }

  function clearLoading() {
    statusEl.innerHTML  = '';
    processBtn.disabled = false;
    micBtn.disabled     = false;
  }

  function showError(msg) {
    clearLoading();
    errorEl.textContent   = `↳ ${msg}`;
    errorEl.style.display = 'block';
  }

  function showResult(markdown) {
    clearLoading();
    errorEl.style.display = 'none';
    const merged = mergeGrouped(loadFromStorage(), parseMarkdown(markdown));
    saveToStorage(merged);
    populateSections(merged);
  }

  // ── Text submit ───────────────────────────────────────────────────────
  processBtn.addEventListener('click', async () => {
    const text = textarea.value.trim();
    if (!text) { showError(t().nothing); return; }

    setLoading(t().processing);
    try {
      const res  = await fetch('/api/process', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ text, lang: currentLang }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `Server error ${res.status}`);
      showResult(data.result);
    } catch (err) {
      showError(err.message);
    }
  });

  // ── Voice recording ───────────────────────────────────────────────────
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;

  if (!SpeechRecognition) {
    micBtn.disabled = true;
    micBtn.title    = 'Voice input requires Chrome or Edge.';
  } else {
    recognition                 = new SpeechRecognition();
    recognition.continuous      = true;
    recognition.interimResults  = true;
    recognition.lang            = T[currentLang].voiceLang;

    let finalTranscript = '';

    recognition.addEventListener('result', (e) => {
      let interim = '';
      finalTranscript = '';
      for (const result of e.results) {
        if (result.isFinal) finalTranscript += result[0].transcript + ' ';
        else interim += result[0].transcript;
      }
      textarea.value = (finalTranscript + interim).trim();
    });

    recognition.addEventListener('end', async () => {
      if (!recording) return;
      recording = false;
      micBtn.classList.remove('recording');
      micLabel.textContent = t().record;

      const text = finalTranscript.trim();
      if (!text) { clearLoading(); showError(t().notHeard); return; }

      textarea.value = text;
      setLoading(t().processing);
      try {
        const res  = await fetch('/api/process', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ text, lang: currentLang }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `Server error ${res.status}`);
        showResult(data.result);
      } catch (err) {
        showError(err.message);
      }
    });

    recognition.addEventListener('error', (e) => {
      recording = false;
      micBtn.classList.remove('recording');
      micLabel.textContent = t().record;
      clearLoading();
      showError(e.error === 'not-allowed'
        ? t().micDenied
        : `${t().voiceErr}${e.error}`);
    });

    micBtn.addEventListener('click', () => {
      if (recording) { recognition.stop(); return; }
      finalTranscript       = '';
      textarea.value        = '';
      recording             = true;
      micBtn.classList.add('recording');
      micLabel.textContent  = t().stop;
      statusEl.innerHTML    = `<div class="spinner"></div><span>${t().listening}</span>`;
      errorEl.style.display = 'none';
      recognition.start();
    });
  }

  // ── Language switcher ─────────────────────────────────────────────────
  document.getElementById('langEn').addEventListener('click', () => applyLang('en'));
  document.getElementById('langSv').addEventListener('click', () => applyLang('sv'));

  // ── Initial render ────────────────────────────────────────────────────
  applyLang(currentLang);
  const saved = loadFromStorage();
  if (Object.keys(saved).length) populateSections(saved);
</script>
</body>
</html>
